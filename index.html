            </a>

            <a href="upload.html" class="menu-card color-2">

                    <p>과제물을 제출하세요</p>

  <style>
    * {
    box-sizing: border-box;
    font-family: 'Pretendard', sans-serif;
}

body {
    background-color: #f0f2f5;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 500px; /* 폰에서 보기 딱 좋은 너비 */
}

header {
    text-align: center;
    margin-bottom: 30px;
}

h1 { color: #333; margin-bottom: 5px; }
header p { color: #777; margin: 0; }

.menu-grid {
    display: grid;
    gap: 15px; /* 카드 사이 간격 */
}

/* 카드 기본 스타일 */
.menu-card {
    display: flex;
    align-items: center;
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-decoration: none;
    color: #333;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
}

.menu-card:active {
    transform: scale(0.98); /* 눌렀을 때 쏙 들어가는 효과 */
}

.icon {
    font-size: 2.5rem;
    margin-right: 20px;
}

.text h3 { margin: 0; font-size: 1.1rem; }
.text p { margin: 5px 0 0; font-size: 0.85rem; color: #888; }

/* 카드별 포인트 컬러 */
.color-1 { border-left: 6px solid #4e73df; }
.color-2 { border-left: 6px solid #1cc88a; }
.color-3 { border-left: 6px solid #36b9cc; }
.color-4 { border-left: 6px solid #f6c23e; }

footer {
    text-align: center;
    margin-top: 40px;
    font-size: 0.8rem;
    color: #bbb;
}
  </style>

</body>
</html>
